{% extends "base.html" %}
{% block content %}
<h1>Sources (Quellen)</h1>

<div style="margin-bottom: 1.5rem; display: flex; gap: 1rem;">
  <a href="/feeds" style="text-decoration: none; color: var(--text); opacity: 0.7;">RSS Feeds</a>
  <a href="/inbox" style="font-weight: bold; text-decoration: none; border-bottom: 2px solid var(--accent); padding-bottom: 0.25rem; color: var(--text);">Inbox Notes (Notizen)</a>
</div>

<p class="muted">
  Notizen, Gedanken, Links, Buchzusammenfassungen – wird als Themen-Segment
  in die nächste Folge aufgenommen.
</p>

<table>
  <thead>
    <tr>
      <th>Datei</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for entry in entries %}
    <tr>
      <td>{{ entry.name }}</td>
      <td>
        <form method="post" action="/inbox/delete" style="margin: 0">
          <input type="hidden" name="filename" value="{{ entry.name }}" />
          <button type="submit" class="secondary">Löschen</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<div class="card">
  <form method="post" action="/inbox">
    <label for="topic">Thema (optional, z.B. books)</label>
    <input type="text" id="topic" name="topic" />

    <label for="priority">Priorität (optional, 0 = normal)</label>
    <input type="number" id="priority" name="priority" value="0" />

    <label for="content">Eintrag</label>
    <textarea id="content" name="content" required></textarea>

    <button type="submit">Eintrag hinzufügen</button>
  </form>
</div>
{% endblock %}
