{% extends "base.html" %}
{% block content %}
<h1>Einstellungen</h1>

<form method="post" action="/settings">
  <label for="language_target">Zielsprache des Sprechtext-Skripts</label>
  <input type="text" id="language_target" name="language_target" value="{{ config.language.target }}" />

  <label for="segment_profile">Segment-Reihenfolge (eine pro Zeile)</label>
  <textarea id="segment_profile" name="segment_profile">{{ config.segment_profile | join("\n") }}</textarea>

  <label for="topics_include">Interessens-Themen – Include (eine pro Zeile, leer = alle)</label>
  <textarea id="topics_include" name="topics_include">{{ config.topics.include | join("\n") }}</textarea>

  <label for="topics_exclude">Themen, die nie vorkommen sollen (eine pro Zeile)</label>
  <textarea id="topics_exclude" name="topics_exclude">{{ config.topics.exclude | join("\n") }}</textarea>

  <label for="exclude_keywords">Ausschluss-Stichwörter (eine pro Zeile)</label>
  <textarea id="exclude_keywords" name="exclude_keywords">{{ config.exclude_keywords | join("\n") }}</textarea>

  <label for="tts_length_scale">TTS-Geschwindigkeit (length_scale, z.B. 1.0 = Standard, < 1.0 = schneller, > 1.0 = langsamer)</label>
  <input type="number" step="0.05" id="tts_length_scale" name="tts_length_scale" value="{{ config.tts.length_scale if config.tts.length_scale is not none else '' }}" placeholder="Standard (1.0)" />

  <label for="tts_sentence_pause_ms">TTS-Pause nach Satzenden (sentence_pause_ms in Millisekunden)</label>
  <input type="number" id="tts_sentence_pause_ms" name="tts_sentence_pause_ms" value="{{ config.tts.sentence_pause_ms }}" />

  <label for="tts_paragraph_pause_ms">TTS-Pause nach Absatzenden (paragraph_pause_ms in Millisekunden)</label>
  <input type="number" id="tts_paragraph_pause_ms" name="tts_paragraph_pause_ms" value="{{ config.tts.paragraph_pause_ms }}" />

  <button type="submit">Speichern</button>
</form>
{% endblock %}
