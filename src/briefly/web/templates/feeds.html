{% extends "base.html" %}
{% block content %}
<h1>RSS-Feeds</h1>

<table>
  <thead>
    <tr>
      <th>URL</th>
      <th>Thema</th>
      <th>Gewicht</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for feed in feeds %}
    <tr>
      <td>{{ feed.url }}</td>
      <td>{{ feed.topic or "–" }}</td>
      <td>{{ feed.weight }}</td>
      <td>
        <form method="post" action="/feeds/delete" style="margin: 0">
          <input type="hidden" name="url" value="{{ feed.url }}" />
          <button type="submit" class="secondary">Entfernen</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<div class="card">
  <form method="post" action="/feeds">
    <label for="url">Feed-URL</label>
    <input type="url" id="url" name="url" required />

    <label for="topic">Thema (z.B. news)</label>
    <input type="text" id="topic" name="topic" />

    <label for="weight">Gewicht</label>
    <input type="number" id="weight" name="weight" value="1.0" step="0.1" />

    <button type="submit">Feed hinzufügen</button>
  </form>
</div>
{% endblock %}
