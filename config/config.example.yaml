# ==========================================
# Beispiel-Konfiguration für Briefly (Daily Cast)
# ==========================================
# Kopiere diese Datei nach config.yaml und passe sie an.
# Alle Einstellungen haben sinnvolle Defaults.

# --- DELIVERY ---
# Einstellungen für die Bereitstellung des Audio-Feeds und des Webservers.
delivery:
  # Provider für das Delivery-Target. Aktuell wird nur 'local_feed' unterstützt.
  provider: local_feed
  
  # Verzeichnis, in dem die Audio-Dateien und Feeds gespeichert werden.
  output_dir: output
  
  # Die Basis-URL, unter der die Podcast-Episoden im Netzwerk erreichbar sind.
  # Für den WLAN-Zugriff auf die IP-Adresse des Macs angepasst (z.B. per `ipconfig getifaddr en0`).
  base_url: "http://<mac-lan-ip>:8787"
  
  # Host-Adresse für den FastAPI Web-Server. '0.0.0.0' macht ihn im lokalen Netz erreichbar.
  host: 0.0.0.0
  
  # Port, auf dem der Web-Server lauscht.
  port: 8787

# --- TTS ---
# Einstellungen für die Piper Text-to-Speech Sprachausgabe.
tts:
  # Provider für die Sprachausgabe. Aktuell wird nur 'piper' unterstützt.
  provider: piper
  
  # Piper-Stimme für deutsche Audio-Generierung.
  voice_de: de_DE-thorsten-medium
  
  # Piper-Stimme für englische Audio-Generierung.
  voice_en: en_US-lessac-medium
  
  # Verzeichnis, in dem die heruntergeladenen Piper-Stimmen liegen (.onnx + .onnx.json).
  voices_dir: data/voices
  
  # Geschwindigkeit/Länge der Sprachausgabe (Standard: null / 1.0, < 1.0 schneller, > 1.0 langsamer).
  length_scale: 1.0
  
  # Pause in Millisekunden nach Satzenden.
  sentence_pause_ms: 250
  
  # Pause in Millisekunden nach Absatzenden.
  paragraph_pause_ms: 600
  
  # Zielsprache für das Sprechtext-Skript (Standard: en).
  language: en

# --- LLM ---
# Einstellungen für das lokale Sprachmodell (Ollama).
llm:
  # Provider für das Sprachmodell. Aktuell wird nur 'ollama' unterstützt.
  provider: ollama
  
  # Name des lokal installierten Ollama-Modells (z.B. qwen3:8b, qwen3:14b).
  model: qwen3:8b

# --- SOURCES ---
# Konfiguration der Inhaltsquellen (Inbox, RSS Feeds, Filter).
sources:
  # Lokale Text-Inbox für Notizen.
  inbox:
    # Verzeichnis, in dem Notizen für die Inbox abgelegt werden.
    path: data/inbox
  
  # RSS-Feed-Quellen für News und sonstige Themen.
  rss:
    feeds:
      # URL des RSS-Feeds.
      - url: "https://www.tagesschau.de/xml/rss2/"
        # Kategorie des Feeds (z.B. news, tech, science).
        topic: news
        # Prioritäts-Gewichtung des Feeds (Standard: 1.0).
        weight: 1.0
  
  # Themenfilter für die Kuratierung.
  topics:
    # Nur Artikel mit diesen Themen einbeziehen (leer = alle zulassen).
    include: []
    # Artikel mit diesen Themen immer ausschließen.
    exclude: []
  
  # Wörter oder Themen, die im Skript generell nie vorkommen sollen.
  exclude_keywords:
    - Krieg
    - Kriminalität
    - Katastrophe
    - war
    - crime
    - disaster

# --- SEGMENTS ---
# Struktur, Aktivierungsstatus und Reihenfolge der Episodenteile.
segments:
  - id: greeting
    enabled: true
  - id: intro
    enabled: true
  - id: news
    enabled: true
  - id: topics
    enabled: true
  - id: outro
    enabled: true

# Name des Benutzers für die Begrüßung (Standard: Anselm).
user_name: Anselm

# --- WEATHER ---
# Wettervorhersage-Konfiguration (Open-Meteo Integration).
weather:
  # Ortsname für die Wettervorhersage (wird einmalig geocodet und gecached).
  location: Berlin
  # Optionale manuelle Eingabe von Koordinaten zur Umgehung von Geocoding.
  # latitude: 52.5243
  # longitude: 13.4105

# --- CALENDAR ---
# Kalender-Konfiguration (ICS Feeds und lokale .ics Dateien).
calendar:
  # Liste von ICS-Kalendern (z.B. Google/Outlook/Apple Feeds oder lokale .ics-Dateien)
  feeds: []
  # Beispiel für einen Eintrag in feeds:
  #   - url: "https://calendar.google.com/calendar/ical/.../public/basic.ics"
  #     include: []
  #     exclude: ["Privat"]

# Ziel-Länge des Audio-Briefings in Minuten (Standard: 10).
target_minutes: 10

# --- SCHEDULE ---
# Zeitplanung für den täglichen Lauf (macOS launchd Integration).
schedule:
  # Stunde des täglichen Starts (0-23).
  hour: 5
  
  # Minute des täglichen Starts (0-59).
  minute: 30
